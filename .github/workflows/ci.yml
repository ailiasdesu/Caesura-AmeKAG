name: CI

on:
  workflow_dispatch:

env:
  BUILD_TYPE: Debug

jobs:
  # ============================================================
  # Windows MSVC (Debug + Release)
  # ============================================================
  build-windows:
    name: "Windows · MSVC · ${{ matrix.config }}"
    continue-on-error: true
    if: github.event_name != 'push'
    runs-on: windows-2022
    strategy:
      fail-fast: false
      matrix:
        config: [Debug, Release]

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install SDL3 (vcpkg)
        shell: pwsh
        run: vcpkg install sdl3 --triplet x64-windows

      - name: Configure
        shell: pwsh
        run: cmake -B build -S . -G "Visual Studio 17 2022" -A x64 -DCMAKE_TOOLCHAIN_FILE="$env:VCPKG_INSTALLATION_ROOT/scripts/buildsystems/vcpkg.cmake" -DVCPKG_APPLOCAL_DEPS=OFF

      - name: Build
        shell: pwsh
        run: cmake --build build --config ${{ matrix.config }} --parallel

      - name: Copy SDL3 DLL
        shell: pwsh
        run: |
          $sdlBin = Join-Path $env:VCPKG_INSTALLATION_ROOT "installed/x64-windows/bin/SDL3.dll"
          if (Test-Path $sdlBin) { Copy-Item $sdlBin "build/${{ matrix.config }}/" }

      - name: Copy SDL3 DLL for tests
        shell: pwsh
        run: |
          $sdlBin = Join-Path $env:VCPKG_INSTALLATION_ROOT "installed/x64-windows/bin/SDL3.dll"
          if (Test-Path $sdlBin) { Copy-Item $sdlBin "build/tests/${{ matrix.config }}/" }

      - name: Test
        continue-on-error: true
        shell: pwsh
        run: |
          Push-Location "build/tests/${{ matrix.config }}"
          & ".\CaesuraTests.exe" 2>&1 | Select-Object -Last 10
          Pop-Location

      - name: Smoke Test
        if: matrix.config == 'Debug'
        shell: pwsh
        run: |
          $exe = "build/${{ matrix.config }}/CaesuraAmeKAG.exe"
          if (Test-Path $exe) { Write-Host "Engine OK: $((Get-Item $exe).Length/1MB) MB" }

  # ============================================================
  # macOS Clang
  # ============================================================
  build-macos:
    name: "macOS · Clang"
    continue-on-error: true
    if: github.event_name != 'push'
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install Dependencies
        run: brew install cmake sdl3 freetype zstd openssl@3 pkg-config

      - name: Configure
        run: cmake -B build -S . -DCMAKE_BUILD_TYPE=Debug -DCAESURA_ENABLE_FFMPEG=OFF -DBX_CONFIG_DEBUG=1 -DCMAKE_PREFIX_PATH="$(brew --prefix openssl@3)"

      - name: Build
        run: cmake --build build --config Debug --parallel $(sysctl -n hw.logicalcpu)

      - name: Test
        continue-on-error: true
        run: ./build/tests/CaesuraTests || true

  # ============================================================
  # Linux GCC
  # ============================================================
  build-linux:
    name: "Linux · GCC"
    continue-on-error: true
    if: github.event_name != 'push'
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake build-essential libfreetype-dev libzstd-dev libssl-dev libx11-dev libxrandr-dev libxext-dev libxfixes-dev libxi-dev libxcursor-dev libxinerama-dev libpulse-dev libasound2-dev libwayland-dev libdrm-dev libgbm-dev libibus-1.0-dev libudev-dev pkg-config wget

      - name: Build SDL3
        run: |
          wget -q https://github.com/libsdl-org/SDL/releases/download/release-3.2.0/SDL3-3.2.0.tar.gz
          tar xzf SDL3-3.2.0.tar.gz
          cd SDL3-3.2.0
          cmake -B build -DCMAKE_BUILD_TYPE=Release -DSDL_SHARED=OFF -DSDL_STATIC=ON -DSDL_TESTS=OFF -DSDL_EXAMPLES=OFF -DCMAKE_INSTALL_PREFIX=/usr/local
          cmake --build build --parallel $(nproc)
          sudo cmake --install build
          cd ..
          rm -rf SDL3-3.2.0 SDL3-3.2.0.tar.gz

      - name: Configure
        run: cmake -B build -S . -DCMAKE_BUILD_TYPE=Debug -DCAESURA_ENABLE_FFMPEG=OFF -DBX_CONFIG_DEBUG=1

      - name: Build
        run: cmake --build build --config Debug --parallel $(nproc)

      - name: Test
        continue-on-error: true
        run: ./build/tests/CaesuraTests || true

  # ============================================================
  # Release Package (Windows only)
  # ============================================================
  release:
    name: "Release · Package"
    if: github.ref == 'refs/heads/master' || github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/')
    runs-on: windows-2022
    needs: build-windows
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install SDL3 (vcpkg)
        shell: pwsh
        run: vcpkg install sdl3 --triplet x64-windows

      - name: Configure Release
        shell: pwsh
        run: cmake -B build -S . -G "Visual Studio 17 2022" -A x64 -DCMAKE_BUILD_TYPE=Release -DCMAKE_TOOLCHAIN_FILE="$env:VCPKG_INSTALLATION_ROOT/scripts/buildsystems/vcpkg.cmake" -DVCPKG_APPLOCAL_DEPS=OFF

      - name: Build Release
        shell: pwsh
        run: cmake --build build --config Release --parallel

      - name: Package (CPack)
        shell: pwsh
        run: cd build; cpack -C Release -G ZIP

      - name: Collect Artifacts
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path release-artifacts
          $zip = Get-ChildItem -Filter "*.zip" -Path build | Select-Object -First 1
          if ($zip) { Copy-Item $zip.FullName release-artifacts/ }
          Copy-Item build/Release/CaesuraAmeKAG.exe release-artifacts/ -ErrorAction SilentlyContinue
          Copy-Item build/Release/SDL3.dll release-artifacts/ -ErrorAction SilentlyContinue

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: caesura-amekag-windows-x64
          path: release-artifacts/
