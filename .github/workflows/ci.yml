name: CI

# Caesura (AmeKAG) — CI/CD Pipeline
# Build + Test on Windows (MSVC), macOS (Clang), Linux (GCC).
# workflow_dispatch only (not on push per project policy).

on:
  workflow_dispatch:

env:
  BUILD_TYPE: Debug

jobs:
  build-windows:
    name: "Windows · MSVC · ${{ matrix.config }}"
    continue-on-error: true
    if: github.event_name != 'push'
    runs-on: windows-2022
    strategy:
      fail-fast: false
      matrix:
        config: [Debug, Release]

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0

      - name: Install dependencies (vcpkg)
        shell: pwsh
        run: vcpkg install sdl3 ffmpeg --triplet x64-windows

      - name: Configure
        shell: pwsh
        run: |
          cmake -B build -S . `
            -G "Visual Studio 17 2022" -A x64 `
            -DCMAKE_TOOLCHAIN_FILE="$env:VCPKG_INSTALLATION_ROOT/scripts/buildsystems/vcpkg.cmake" -DVCPKG_APPLOCAL_DEPS=OFF

      - name: Build
        shell: pwsh
        run: cmake --build build --config ${{ matrix.config }} --parallel

      - name: Copy SDL3 DLL
        shell: pwsh
        run: |
          $dstDir = "build/${{ matrix.config }}"
          $sdlBin = Join-Path $env:VCPKG_INSTALLATION_ROOT "installed/x64-windows/bin/SDL3.dll"
          if (Test-Path $sdlBin) { Copy-Item $sdlBin $dstDir }

      - name: Copy SDL3 DLL for tests
        shell: pwsh
        run: |
          $sdlDll = Join-Path $env:VCPKG_INSTALLATION_ROOT "installed/x64-windows/bin/SDL3.dll"
          if (Test-Path $sdlDll) { Copy-Item $sdlDll "build/tests/${{ matrix.config }}/" }

      - name: Test
        continue-on-error: true
        shell: pwsh
        run: |
          $testExe = "build/tests/${{ matrix.config }}/CaesuraTests.exe"
          if (Test-Path $testExe) {
            Push-Location "build/tests/${{ matrix.config }}"
            & ".\CaesuraTests.exe" 2>&1 | Select-Object -Last 10
            $code = $LASTEXITCODE
            Pop-Location
            if ($code -gt 1) { exit $code }
          } else { Write-Host "::warning::Tests not found"; }

      - name: Smoke Test
        if: matrix.config == 'Debug'
        shell: pwsh
        run: |
          $exe = "build/${{ matrix.config }}/CaesuraAmeKAG.exe"
          if (Test-Path $exe) {
            Write-Host "Engine built: $((Get-Item $exe).Length/1MB) MB"
          } else { exit 1 }

  build-macos:
    name: "macOS · Clang"
    continue-on-error: true
    if: github.event_name != 'push'
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install Dependencies
        run: brew install cmake freetype zstd openssl@3 pkg-config

      - name: Configure
        run: |
          cmake -B build -S . -DCMAKE_BUILD_TYPE=Debug -DBX_CONFIG_DEBUG=1 \
            -DCMAKE_PREFIX_PATH="$(brew --prefix openssl@3)" 

      - name: Build
        run: cmake --build build --config Debug --parallel $(sysctl -n hw.logicalcpu)

      - name: Test
        continue-on-error: true
        run: ./build/tests/CaesuraTests || true

  build-linux:
    name: "Linux · GCC"
    continue-on-error: true
    if: github.event_name != 'push'
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake build-essential libfreetype-dev libzstd-dev libssl-dev libx11-dev libxrandr-dev libxext-dev libxfixes-dev libxi-dev libxss-dev libxcursor-dev libxinerama-dev libpulse-dev libasound2-dev libwayland-dev libdrm-dev libgbm-dev libibus-1.0-dev pkg-config

      - name: Configure
        run: cmake -B build -S . -DCMAKE_BUILD_TYPE=Debug -DBX_CONFIG_DEBUG=1

      - name: Build
        run: cmake --build build --config Debug --parallel $(nproc)

      - name: Test
        continue-on-error: true
        run: ./build/tests/CaesuraTests || true

  coverage:
    name: "Linux · GCC · Coverage"
    continue-on-error: true
    if: github.event_name != 'push'
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake build-essential libfreetype-dev libzstd-dev libssl-dev libx11-dev lcov

      - name: Configure
        run: cmake -B build -S . -DCMAKE_BUILD_TYPE=Debug -DCODE_COVERAGE=ON

      - name: Build
        run: cmake --build build --config Debug --parallel $(nproc)

      - name: Test
        continue-on-error: true
        run: ./build/tests/CaesuraTests || true

      - name: Generate coverage
        run: |
          lcov --capture --directory build --output-file coverage.info
          lcov --remove coverage.info '/usr/*' '*/external/*' '*/tests/*' --output-file coverage_filtered.info
          genhtml coverage_filtered.info --output-directory coverage_report

      - name: Upload coverage
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage_report/

  release:
    name: "Release · Package"
    if: github.ref == 'refs/heads/master' || github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/')
    runs-on: windows-2022
    needs: build-windows
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install dependencies (vcpkg)
        shell: pwsh
        run: vcpkg install sdl3 ffmpeg --triplet x64-windows

      - name: Configure Release
        shell: pwsh
        run: |
          cmake -B build -S . `
            -G "Visual Studio 17 2022" -A x64 `
            -DCMAKE_BUILD_TYPE=Release `
            -DCMAKE_TOOLCHAIN_FILE="$env:VCPKG_INSTALLATION_ROOT/scripts/buildsystems/vcpkg.cmake" -DVCPKG_APPLOCAL_DEPS=OFF

      - name: Build Release
        shell: pwsh
        run: cmake --build build --config Release --parallel

      - name: Package (CPack)
        shell: pwsh
        run: |
          cd build
          cpack -C Release -G ZIP

      - name: Collect Artifacts
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path release-artifacts
          $zip = Get-ChildItem -Filter "*.zip" -Path build | Select-Object -First 1
          if ($zip) { Copy-Item $zip.FullName release-artifacts/ }
          Copy-Item build/Release/CaesuraAmeKAG.exe release-artifacts/ -ErrorAction SilentlyContinue
          Copy-Item build/Release/SDL3.dll release-artifacts/ -ErrorAction SilentlyContinue

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: caesura-amekag-windows-x64
          path: release-artifacts/

      - name: Upload to Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: release-artifacts/*
          generate_release_notes: true